name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install tooling
        run: |
          brew update
          brew install swiftlint swiftformat clang-format
      - name: SwiftLint (strict)
        if: '!cancelled()'
        run: swiftlint --strict --reporter github-actions-logging
      - name: SwiftFormat (lint mode)
        if: '!cancelled()'
        run: swiftformat --lint .
      - name: clang-format check (C/C++)
        if: '!cancelled()'
        run: |
          shopt -s globstar nullglob
          files=( Packages/**/*.{c,cc,cpp,h,hpp,m,mm} )
          if [ ${#files[@]} -eq 0 ]; then
            echo "No C/C++ files to check."
            exit 0
          fi
          clang-format --dry-run --Werror "${files[@]}"

  build-test:
    name: Build & Test
    runs-on: macos-15
    needs: lint
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.0.app/Contents/Developer
      DESTINATION: "platform=iOS Simulator,name=iPhone 16,OS=latest"
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Chips.xcodeproj \
            -scheme Chips

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project Chips.xcodeproj \
            -scheme Chips \
            -destination "$DESTINATION" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Test (app target)
        run: |
          set -o pipefail
          xcodebuild test \
            -project Chips.xcodeproj \
            -scheme Chips \
            -destination "$DESTINATION" \
            -configuration Debug \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Test Swift Packages (standalone)
        run: |
          set -o pipefail
          for pkg in Packages/*/; do
            if [ -f "$pkg/Package.swift" ]; then
              echo "::group::Testing $pkg"
              # Algunos paquetes (UIKit/AudioHost) requieren simulador y se cubren via app scheme.
              # Aquí solo validamos resolución y build.
              swift build --package-path "$pkg" 2>/dev/null || \
                echo "Note: $pkg may require iOS-only APIs; skipped at SwiftPM level."
              echo "::endgroup::"
            fi
          done
