included:
  - Chips
  - Packages

excluded:
  - .build
  - .swiftpm
  - DerivedData
  - Packages/*/.build
  - fastlane

# Conjunto mínimo y seguro para M0. Se añadirán más reglas a medida
# que el codebase crezca y validemos cada una en CI.
opt_in_rules:
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - last_where
  - operator_usage_whitespace
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - sorted_imports
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

disabled_rules:
  - todo
  - trailing_comma  # gestionado por SwiftFormat (--commas always)

line_length:
  warning: 140
  error: 200
  ignores_urls: true
  ignores_comments: true

file_length:
  warning: 600
  error: 1000

type_body_length:
  warning: 400
  error: 600

function_body_length:
  warning: 60
  error: 120

cyclomatic_complexity:
  warning: 15
  error: 25

identifier_name:
  min_length: 2
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - i
    - j
    - n
    - r
    - g
    - b
    - a

force_cast: error
force_try: error
