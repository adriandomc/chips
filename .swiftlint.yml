included:
  - Chips
  - Packages

excluded:
  - .build
  - .swiftpm
  - DerivedData
  - Packages/*/.build
  - Packages/*/Tests
  - fastlane

opt_in_rules:
  - anyobject_protocol
  - array_init
  - attributes
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_header
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - implicit_return
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - legacy_random
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_super_call
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - shorthand_operator
  - sorted_first_last
  - static_operator
  - strict_fileprivate
  - toggle_bool
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - unused_declaration
  - unused_import
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

disabled_rules:
  - todo

line_length:
  warning: 140
  error: 200
  ignores_urls: true
  ignores_comments: true

file_length:
  warning: 600
  error: 1000

type_body_length:
  warning: 400
  error: 600

function_body_length:
  warning: 60
  error: 120

cyclomatic_complexity:
  warning: 15
  error: 25

identifier_name:
  min_length: 2
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - i
    - j
    - n
    - r
    - g
    - b
    - a

force_cast: error
force_try: error
force_unwrapping: error

custom_rules:
  no_print:
    name: "No print() in production code"
    regex: '(?<!Swift\.)print\('
    match_kinds:
      - identifier
    message: "Use os_log / Logger instead of print(). print() is forbidden outside of debug-only code paths."
    severity: warning
  no_swiftui_in_product:
    name: "No SwiftUI in product surfaces"
    regex: 'import SwiftUI'
    match_kinds:
      - keyword
      - identifier
    message: "SwiftUI is prohibited in product UI. Allowed only in debug/tooling targets — confirm via PR review."
    severity: warning
